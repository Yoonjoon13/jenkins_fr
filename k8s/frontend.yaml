apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-frontend
  namespace: beom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins-frontend
  template:
    metadata:
      labels:
        app: jenkins-frontend
    spec:
      containers:
        - name: frontend
          image: chefjun/frontend:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service  
metadata:
  name: jenkins-frontend-service  
  namespace: beom
spec:
  type: NodePort
  selector:
    app: jenkins-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
